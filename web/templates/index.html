<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>AXON</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{
  --bg:#020408;--panel:#060c14;--border:#0a1628;
  --cyan:#00f5ff;--green:#00ff88;--purple:#bf5fff;
  --red:#ff3355;--orange:#ff8800;--yellow:#ffdd00;
  --text:#c8e0f0;--muted:#1a3050;--dim:#0d1f35;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;}

/* ── LAYOUT ─────────────────────────────────────────────── */
#app{display:grid;grid-template-columns:280px 1fr 280px;grid-template-rows:48px 1fr 160px;height:100vh;gap:1px;background:var(--border);}
#header{grid-column:1/-1;background:var(--panel);display:flex;align-items:center;gap:16px;padding:0 20px;border-bottom:1px solid var(--border);}
#left-panel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden;}
#brain-view{background:var(--bg);position:relative;overflow:hidden;}
#right-panel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden;}
#bottom-bar{grid-column:1/-1;background:var(--panel);display:flex;gap:1px;overflow:hidden;}

/* ── HEADER ─────────────────────────────────────────────── */
.logo{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--cyan);letter-spacing:4px;text-shadow:0 0 20px var(--cyan);}
.logo span{color:var(--purple);}
.status-row{display:flex;gap:10px;align-items:center;margin-left:auto;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.status-dot.active{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s infinite;}
.status-dot.thinking{background:var(--purple);box-shadow:0 0 8px var(--purple);animation:blink .6s infinite;}
.status-dot.speaking{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blink .4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.status-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.hdr-stat{text-align:center;border-left:1px solid var(--border);padding-left:12px;}
.hdr-stat .v{font-size:14px;font-weight:700;font-family:'Orbitron',sans-serif;}
.hdr-stat .l{font-size:8px;color:var(--muted);letter-spacing:.5px;}

/* ── LEFT PANEL ──────────────────────────────────────────── */
.panel-title{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.region-list{flex:1;overflow-y:auto;padding:6px;}
.region-row{display:flex;align-items:center;gap:7px;padding:4px 6px;margin-bottom:3px;border-radius:3px;transition:background .2s;}
.region-row.active{background:#0a1628;}
.region-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all .2s;}
.region-name{font-size:9px;letter-spacing:.5px;flex:1;}
.region-bar-wrap{width:60px;background:var(--dim);border-radius:2px;height:3px;}
.region-bar{height:100%;border-radius:2px;transition:width .2s;}
.region-val{font-size:9px;width:28px;text-align:right;color:var(--muted);}

/* Memory section */
.mem-section{border-top:1px solid var(--border);padding:6px 8px;flex-shrink:0;}
.mem-title{font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;}
.mem-stat{display:flex;justify-content:space-between;font-size:9px;padding:1px 0;}
.mem-stat .k{color:var(--muted);}
.mem-stat .v{color:var(--cyan);}
.mem-connections{margin-top:4px;}
.mem-conn{font-size:8px;color:#1a3050;margin:1px 0;}
.mem-conn.strong{color:var(--purple);}

/* ── BRAIN CANVAS ────────────────────────────────────────── */
#brain-canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#optic-canvas{position:absolute;bottom:8px;right:8px;width:120px;height:90px;border:1px solid #0a1628;border-radius:3px;opacity:.85;}
.brain-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}
.signal-output{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.sig-pill{padding:3px 10px;border-radius:12px;font-size:9px;font-weight:700;border:1px solid;letter-spacing:1px;transition:all .3s;font-family:'Orbitron',sans-serif;}
.sig-pill-buy {border-color:#00ff8833;color:#00ff88;background:#00ff880a;}
.sig-pill-hold{border-color:#ffdd0033;color:#ffdd00;background:#ffdd000a;}
.sig-pill-sell{border-color:#ff335533;color:#ff3355;background:#ff33550a;}
.sig-pill.hot{filter:brightness(1.5);box-shadow:0 0 12px currentColor;}
.brain-label{position:absolute;font-size:7px;letter-spacing:1.5px;color:#ffffff15;text-transform:uppercase;font-family:'Orbitron',sans-serif;transition:color .4s;}
.brain-label.lit{color:#ffffff50;}
.thought-bubble{position:absolute;bottom:8px;left:8px;right:135px;background:rgba(6,12,20,.9);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:10px;color:var(--text);line-height:1.4;max-height:70px;overflow:hidden;transition:border-color .3s;}
.thought-bubble.thinking{border-color:var(--purple);}
.thought-bubble.speaking{border-color:var(--cyan);}

/* ── RIGHT PANEL ─────────────────────────────────────────── */
.conversation{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:5px;}
.msg{padding:5px 8px;border-radius:4px;font-size:10px;line-height:1.4;max-width:100%;word-break:break-word;}
.msg-user{background:#0a1a2a;border-left:2px solid var(--cyan);color:var(--text);}
.msg-axon{background:#080d18;border-left:2px solid var(--purple);color:#d0e8ff;}
.msg-sys {background:#050a10;color:var(--muted);font-size:9px;border-left:2px solid var(--border);}
.msg-label{font-size:8px;letter-spacing:1px;margin-bottom:2px;text-transform:uppercase;}

/* Input area */
.input-area{border-top:1px solid var(--border);padding:7px 8px;flex-shrink:0;}
.input-row{display:flex;gap:6px;}
#text-input{flex:1;background:var(--dim);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:10px;outline:none;transition:border-color .2s;}
#text-input:focus{border-color:var(--cyan);}
.mic-btn{width:30px;border:1px solid var(--border);background:var(--dim);color:var(--muted);border-radius:3px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.mic-btn.hot{border-color:var(--red);color:var(--red);box-shadow:0 0 8px var(--red);}
.send-btn{padding:5px 10px;background:var(--cyan);color:var(--bg);border:none;border-radius:3px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;transition:opacity .15s;}
.send-btn:hover{opacity:.8;}

/* ── BOTTOM BAR ──────────────────────────────────────────── */
.bottom-section{flex:1;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;padding:6px 8px;}
.bottom-title{font-size:7px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
#console-out{flex:1;overflow-y:auto;font-size:8px;color:#1a4a2a;line-height:1.4;}
#console-out span{display:block;}
#console-out .info{color:#0a3050;}
#console-out .heard{color:#0a5030;}
#console-out .said{color:#1a2060;}
#console-out .err{color:#501010;}

/* Waveform canvas */
#wave-canvas{width:100%;height:100%;display:block;}

/* Memory graph */
#mem-canvas{width:100%;height:100%;display:block;}

/* Settings section */
.settings{padding:6px 8px;display:flex;flex-direction:column;gap:5px;}
.settings label{font-size:8px;color:var(--muted);letter-spacing:.5px;}
.settings input{width:100%;background:var(--dim);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:2px;font-size:9px;font-family:monospace;}
.settings-row{display:flex;gap:5px;}
.toggle{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--muted);}
.toggle input{width:auto;}
.ctrl-btn{flex:1;padding:4px;border-radius:3px;border:1px solid var(--border);background:var(--dim);color:var(--text);font-size:9px;font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.ctrl-btn.danger{border-color:#ff335533;color:var(--red);}
.ctrl-btn.danger:hover{border-color:var(--red);}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="logo">AX<span>O</span>N</div>
    <div style="font-size:8px;color:var(--muted);letter-spacing:2px;">EMERGING INTELLIGENCE v0.1</div>
    <div class="status-row">
      <div class="status-dot" id="dot-alive"></div>
      <div class="status-label" id="lbl-status">OFFLINE</div>
      <div class="status-dot" id="dot-listen" style="margin-left:8px"></div>
      <div class="status-label">LISTEN</div>
      <div class="status-dot" id="dot-think"></div>
      <div class="status-label">THINK</div>
      <div class="status-dot" id="dot-speak"></div>
      <div class="status-label">SPEAK</div>
    </div>
    <div style="display:flex;gap:16px;margin-left:16px;">
      <div class="hdr-stat"><div class="v" id="h-episodes" style="color:var(--purple)">0</div><div class="l">Episodes</div></div>
      <div class="hdr-stat"><div class="v" id="h-emotion" style="color:var(--cyan)">—</div><div class="l">Emotion</div></div>
      <div class="hdr-stat"><div class="v" id="h-uptime" style="color:var(--green)">0s</div><div class="l">Uptime</div></div>
    </div>
  </header>

  <!-- LEFT: Neuron regions -->
  <div id="left-panel">
    <div class="panel-title">⬡ Neural Regions</div>
    <div class="region-list" id="region-list"></div>
    <div class="mem-section">
      <div class="mem-title">⟳ Hebbian Memory</div>
      <div class="mem-stat"><span class="k">Episodes</span><span class="v" id="m-eps">0</span></div>
      <div class="mem-stat"><span class="k">Connections</span><span class="v" id="m-conn">0</span></div>
      <div class="mem-connections" id="m-conns"></div>
    </div>
  </div>

  <!-- CENTER: Brain visualization -->
  <div id="brain-view">
    <canvas id="brain-canvas"></canvas>
    <canvas id="optic-canvas"></canvas>
    <div class="brain-overlay">
      <div class="signal-output" id="signal-output" style="display:none">
        <div class="sig-pill sig-pill-buy"  id="pill-buy">BUY</div>
        <div class="sig-pill sig-pill-hold" id="pill-hold">HOLD</div>
        <div class="sig-pill sig-pill-sell" id="pill-sell">SELL</div>
      </div>
    </div>
    <div class="thought-bubble" id="thought-bubble">Initializing neural substrate...</div>
  </div>

  <!-- RIGHT: Conversation -->
  <div id="right-panel">
    <div class="panel-title">◈ Consciousness Stream</div>
    <div class="conversation" id="conversation"></div>
    <div class="input-area">
      <div class="input-row">
        <button class="mic-btn" id="mic-btn" title="Push to talk">🎙</button>
        <input id="text-input" placeholder="speak or type..." autocomplete="off"/>
        <button class="send-btn" onclick="sendText()">SEND</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM: Console + Waveform + Memory + Settings -->
  <div id="bottom-bar">
    <div class="bottom-section" style="flex:2">
      <div class="bottom-title">▸ System Log</div>
      <div id="console-out"></div>
    </div>
    <div class="bottom-section" style="flex:1;background:#04080f;">
      <div class="bottom-title">◎ Auditory Wave</div>
      <canvas id="wave-canvas"></canvas>
    </div>
    <div class="bottom-section" style="flex:1;background:#04080f;">
      <div class="bottom-title">◈ Memory Graph</div>
      <canvas id="mem-canvas"></canvas>
    </div>
    <div class="bottom-section" style="flex:1.2;">
      <div class="bottom-title">⚙ Control</div>
      <div class="settings">
        <label>LM Studio URL</label>
        <input id="cfg-lmurl" value="http://localhost:1234" placeholder="http://localhost:1234"/>
        <label style="margin-top:4px;">LM Studio Model (leave blank = auto)</label>
        <input id="cfg-lmmodel" placeholder="auto-detect"/>
        <label style="margin-top:4px;">Anthropic API Key (fallback)</label>
        <input id="cfg-api" type="password" placeholder="sk-ant-... (optional if using LM Studio)"/>
        <div class="settings-row" style="margin-top:4px;">
          <label class="toggle"><input type="checkbox" id="cfg-local" checked/> Prefer Local LLM</label>
          <label class="toggle"><input type="checkbox" id="cfg-cam" checked/> Cam</label>
          <label class="toggle"><input type="checkbox" id="cfg-mic" checked/> Mic</label>
        </div>
        <div class="settings-row" style="margin-top:4px;">
          <button class="ctrl-btn" onclick="startAxon()">▶ ACTIVATE</button>
          <button class="ctrl-btn" onclick="reprobe()" style="flex:.6">⟳ LM</button>
          <button class="ctrl-btn danger" onclick="stopAxon()">■ STOP</button>
        </div>
        <div id="llm-status" style="font-size:8px;color:var(--muted);margin-top:4px;"></div>
      </div>
    </div>
  </div>

</div>

<script>
const socket = io();
let startTime = null;
let volumeHistory = new Array(120).fill(-60);

// ═══════════════════════════════════════════════════════════
//  REGION DEFINITIONS
// ═══════════════════════════════════════════════════════════
const REGIONS = [
  {id:'optic',      label:'Optic Cortex',   color:'#00f5ff', icon:'👁'},
  {id:'auditory',   label:'Auditory Cortex',color:'#00ff88', icon:'👂'},
  {id:'thalamus',   label:'Thalamus',       color:'#ffdd00', icon:'⬡'},
  {id:'columns',    label:'Cortical Cols',  color:'#bf5fff', icon:'⊞'},
  {id:'hippocampus',label:'Hippocampus',    color:'#ff8800', icon:'🐚'},
  {id:'prefrontal', label:'Prefrontal',     color:'#00ff88', icon:'◈'},
  {id:'dopamine',   label:'Dopamine (VTA)', color:'#ff3355', icon:'💊'},
  {id:'language',   label:'Language Core',  color:'#00f5ff', icon:'◇'},
  {id:'memory',     label:'Memory Trace',   color:'#bf5fff', icon:'⟳'},
  {id:'speech',     label:'Speech Output',  color:'#00ff88', icon:'◉'},
];

// Build region list
const rl = document.getElementById('region-list');
REGIONS.forEach(r => {
  const row = document.createElement('div');
  row.className='region-row'; row.id='rr-'+r.id;
  row.innerHTML=`<div class="region-dot" id="rdot-${r.id}" style="background:${r.color}22;border:1px solid ${r.color}44"></div>
    <div class="region-name" style="color:${r.color}88">${r.icon} ${r.label}</div>
    <div class="region-bar-wrap"><div class="region-bar" id="rbar-${r.id}" style="background:${r.color};width:0%"></div></div>
    <div class="region-val" id="rval-${r.id}">0%</div>`;
  rl.appendChild(row);
});

function updateRegions(state) {
  REGIONS.forEach(r => {
    let val = 0;
    if (r.id === 'columns') {
      const arr = state[r.id] || [];
      val = arr.reduce((s,v)=>s+v,0)/Math.max(arr.length,1);
    } else {
      val = state[r.id] || 0;
    }
    const pct  = (val*100).toFixed(0);
    const dot  = document.getElementById('rdot-'+r.id);
    const bar  = document.getElementById('rbar-'+r.id);
    const lbl  = document.getElementById('rval-'+r.id);
    const row  = document.getElementById('rr-'+r.id);
    bar.style.width  = pct+'%';
    lbl.textContent  = pct+'%';
    row.classList.toggle('active', val > 0.1);
    if(val > 0.5) {
      dot.style.background = REGIONS.find(x=>x.id===r.id).color;
      dot.style.boxShadow  = `0 0 6px ${REGIONS.find(x=>x.id===r.id).color}`;
    } else {
      const c = REGIONS.find(x=>x.id===r.id).color;
      dot.style.background = c+'22';
      dot.style.boxShadow  = 'none';
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  BRAIN CANVAS
// ═══════════════════════════════════════════════════════════
const BC = {
  canvas:null, ctx:null, W:0, H:0,
  nodes:[], edges:[], sparks:[],
  time:0, regionMap:{},
};

const BRAIN_REGIONS = [
  {id:'optic',      label:'OPTIC CORTEX',   cx:.5,  cy:.95, r:.05, color:'#00f5ff', n:10},
  {id:'auditory',   label:'AUDITORY',       cx:.15, cy:.82, r:.045,color:'#00ff88', n:8 },
  {id:'thalamus',   label:'THALAMUS',       cx:.5,  cy:.78, r:.055,color:'#ffdd00', n:10},
  {id:'col0',       label:'',               cx:.2,  cy:.60, r:.035,color:'#bf5fff', n:6 },
  {id:'col1',       label:'',               cx:.35, cy:.54, r:.035,color:'#bf5fff', n:6 },
  {id:'col2',       label:'CORTEX',         cx:.5,  cy:.52, r:.035,color:'#bf5fff', n:6 },
  {id:'col3',       label:'',               cx:.65, cy:.54, r:.035,color:'#bf5fff', n:6 },
  {id:'col4',       label:'',               cx:.8,  cy:.60, r:.035,color:'#bf5fff', n:6 },
  {id:'hippocampus',label:'HIPPOCAMPUS',    cx:.22, cy:.36, r:.06, color:'#ff8800', n:12},
  {id:'language',   label:'LANGUAGE',       cx:.72, cy:.36, r:.055,color:'#00f5ff', n:10},
  {id:'prefrontal', label:'PREFRONTAL',     cx:.5,  cy:.18, r:.075,color:'#00ff88', n:16},
  {id:'dopamine',   label:'VTA',            cx:.78, cy:.55, r:.04, color:'#ff3355', n:7 },
  {id:'memory',     label:'MEMORY',         cx:.22, cy:.18, r:.05, color:'#bf5fff', n:8 },
  {id:'speech',     label:'SPEECH',         cx:.78, cy:.18, r:.05, color:'#00ff88', n:8 },
];

const BRAIN_EDGES = [
  ['optic','thalamus'],['auditory','thalamus'],
  ['thalamus','col0'],['thalamus','col1'],['thalamus','col2'],['thalamus','col3'],['thalamus','col4'],
  ['col0','hippocampus'],['col1','hippocampus'],['col2','hippocampus'],['col2','language'],
  ['col3','language'],['col4','language'],
  ['hippocampus','prefrontal'],['language','prefrontal'],
  ['hippocampus','memory'],['memory','prefrontal'],
  ['dopamine','prefrontal'],['dopamine','hippocampus'],
  ['prefrontal','speech'],['prefrontal','dopamine'],
  ['language','speech'],
];

function initBrain() {
  const cv = document.getElementById('brain-canvas');
  BC.canvas = cv; BC.ctx = cv.getContext('2d');
  resizeBrain();
  window.addEventListener('resize', resizeBrain);
  buildBrainGraph();
  animateBrain();
}

function resizeBrain() {
  const bv = document.getElementById('brain-view');
  BC.W = bv.clientWidth; BC.H = bv.clientHeight;
  BC.canvas.width = BC.W; BC.canvas.height = BC.H;
  buildBrainGraph();
}

function buildBrainGraph() {
  BC.nodes=[]; BC.edges=[]; BC.regionMap={};
  const W=BC.W, H=BC.H;
  if(!W||!H) return;

  BRAIN_REGIONS.forEach(rd => {
    const rx=rd.cx*W, ry=rd.cy*H, rr=rd.r*Math.min(W,H)*0.9;
    const nodes=[];
    for(let i=0;i<rd.n;i++) {
      const angle=(i/rd.n)*Math.PI*2 + Math.random()*.5;
      const dist=rr*(0.25+0.75*Math.random());
      nodes.push({
        id:`${rd.id}_${i}`, region:rd.id,
        x:rx+Math.cos(angle)*dist, y:ry+Math.sin(angle)*dist,
        bx:rx+Math.cos(angle)*dist, by:ry+Math.sin(angle)*dist,
        color:rd.color, activation:0, firing:0,
        phase:Math.random()*Math.PI*2, radius:2+Math.random()*2.5,
      });
    }
    nodes.forEach(n=>BC.nodes.push(n));
    BC.regionMap[rd.id]={def:rd, nodes, cx:rx, cy:ry};
  });

  BRAIN_EDGES.forEach(([f,t]) => {
    const fr=BC.regionMap[f], tr=BC.regionMap[t];
    if(!fr||!tr) return;
    const cnt=Math.min(fr.nodes.length,tr.nodes.length,5);
    for(let i=0;i<cnt;i++) {
      BC.edges.push({
        from:fr.nodes[i%fr.nodes.length],
        to:  tr.nodes[i%tr.nodes.length],
        fromR:f, toR:t, color:fr.def.color, strength:0,
      });
    }
  });
}

function animateBrain() {
  requestAnimationFrame(animateBrain);
  const ctx=BC.ctx, W=BC.W, H=BC.H;
  if(!W||!H) return;
  BC.time+=0.016;

  ctx.fillStyle='rgba(2,4,8,0.2)';
  ctx.fillRect(0,0,W,H);

  // Draw edges
  BC.edges.forEach(e=>{
    if(e.strength<0.01) return;
    const grd=ctx.createLinearGradient(e.from.x,e.from.y,e.to.x,e.to.y);
    grd.addColorStop(0,rgba(e.color,e.strength*.4));
    grd.addColorStop(1,rgba(e.color,e.strength*.1));
    ctx.beginPath();
    ctx.moveTo(e.from.x,e.from.y);
    const mx=(e.from.x+e.to.x)/2+(Math.random()-.5)*15;
    const my=(e.from.y+e.to.y)/2+(Math.random()-.5)*15;
    ctx.quadraticCurveTo(mx,my,e.to.x,e.to.y);
    ctx.strokeStyle=grd;
    ctx.lineWidth=.5+e.strength*2;
    ctx.stroke();
    e.strength*=0.93;
  });

  // Draw sparks
  BC.sparks=BC.sparks.filter(s=>s.life>0.01);
  BC.sparks.forEach(s=>{
    s.t+=s.speed; s.life-=s.speed*.8;
    const t=Math.min(s.t,1), mt=1-t;
    const x=mt*mt*s.x0+2*mt*t*s.mx+t*t*s.x1;
    const y=mt*mt*s.y0+2*mt*t*s.my+t*t*s.y1;
    ctx.beginPath();
    ctx.arc(x,y,1.5+s.size*.8,0,Math.PI*2);
    ctx.fillStyle=rgba(s.color,s.life*.9);
    ctx.shadowBlur=10; ctx.shadowColor=s.color;
    ctx.fill();
    ctx.shadowBlur=0;
    if(s.t>=1&&s.onArrive){s.onArrive();s.onArrive=null;}
  });

  // Draw neurons
  BC.nodes.forEach(n=>{
    n.x=n.bx+Math.sin(BC.time*.4+n.phase)*1.5;
    n.y=n.by+Math.cos(BC.time*.35+n.phase)*1.5;
    const a=n.activation;
    if(a>0.05){
      const gr=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.radius*(3+a*5));
      gr.addColorStop(0,rgba(n.color,a*.7));
      gr.addColorStop(1,rgba(n.color,0));
      ctx.beginPath(); ctx.arc(n.x,n.y,n.radius*(3+a*5),0,Math.PI*2);
      ctx.fillStyle=gr; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(n.x,n.y,n.radius,0,Math.PI*2);
    ctx.fillStyle=rgba(n.color,.12+a*.88);
    if(a>.6){ctx.shadowBlur=15;ctx.shadowColor=n.color;}
    ctx.fill(); ctx.shadowBlur=0;
    if(n.firing>0){
      ctx.beginPath(); ctx.arc(n.x,n.y,n.radius+n.firing*20,0,Math.PI*2);
      ctx.strokeStyle=rgba(n.color,n.firing*.7);
      ctx.lineWidth=1; ctx.stroke();
      n.firing*=.80;
    }
    n.activation*=0.96;
  });

  // Region labels
  BRAIN_REGIONS.forEach(rd=>{
    if(!rd.label) return;
    const rm=BC.regionMap[rd.id];
    if(!rm) return;
    const avgA=rm.nodes.reduce((s,n)=>s+n.activation,0)/rm.nodes.length;
    ctx.font=`${avgA>.2?'700':'400'} 7px Orbitron,monospace`;
    ctx.fillStyle=avgA>.15?rgba(rd.color,.8):'rgba(255,255,255,0.06)';
    ctx.textAlign='center';
    ctx.fillText(rd.label, rm.cx, rm.cy+rd.r*Math.min(BC.W,BC.H)*0.9+14);
  });
}

function fireRegion(regionId, strengths) {
  const rm=BC.regionMap[regionId];
  if(!rm) return;
  rm.nodes.forEach((n,i)=>{
    const s=Array.isArray(strengths)?strengths[i%strengths.length]:strengths;
    if((s||0)<0.05) return;
    setTimeout(()=>{
      n.activation=Math.min(1,n.activation+(s||0));
      n.firing=1;
      BC.edges.forEach(e=>{
        if(e.from!==n) return;
        e.strength=Math.max(e.strength,s*.8);
        if(Math.random()<s*.6){
          const mx=(n.x+e.to.x)/2+(Math.random()-.5)*30;
          const my=(n.y+e.to.y)/2+(Math.random()-.5)*30;
          BC.sparks.push({
            x0:n.x,y0:n.y,mx,my,x1:e.to.x,y1:e.to.y,
            t:0,life:1,speed:.03+Math.random()*.025,
            color:e.color,size:Math.random()*1.5,
            onArrive:()=>{e.to.activation=Math.min(1,e.to.activation+s*.5);e.to.firing=.7;}
          });
        }
      });
    }, Math.random()*80);
  });
}

function ingestNeuronState(state) {
  if(!state) return;
  const map={
    optic:'optic', auditory:'auditory', thalamus:'thalamus',
    hippocampus:'hippocampus', prefrontal:'prefrontal',
    dopamine:'dopamine', language:'language', memory:'memory', speech:'speech',
  };
  Object.entries(map).forEach(([k,rid])=>{
    const v=state[k]||0;
    if(v>0.05) fireRegion(rid, v);
  });
  // Columns
  const cols=state.columns||[];
  cols.forEach((v,i)=>{ if(v>0.05) fireRegion('col'+i, v); });
}

// Idle ambient
setInterval(()=>{
  const rd=BRAIN_REGIONS[Math.floor(Math.random()*BRAIN_REGIONS.length)];
  const rm=BC.regionMap[rd.id];
  if(rm&&rm.nodes.length){
    const n=rm.nodes[Math.floor(Math.random()*rm.nodes.length)];
    n.activation=Math.min(1,n.activation+.08+Math.random()*.1);
    n.firing=.4;
  }
},200);

// ═══════════════════════════════════════════════════════════
//  OPTIC CANVAS — pixel neuron display
// ═══════════════════════════════════════════════════════════
const OC={canvas:null, ctx:null};
function initOptic(){
  OC.canvas=document.getElementById('optic-canvas');
  OC.ctx=OC.canvas.getContext('2d');
  OC.canvas.width=128; OC.canvas.height=96;
}
function drawOptic(pixels,edges){
  if(!pixels||!OC.ctx) return;
  const ctx=OC.ctx;
  const W=128,H=96,PW=W/64,PH=H/48;
  ctx.clearRect(0,0,W,H);
  // Pixel neurons
  pixels.forEach((row,ri)=>row.forEach((v,ci)=>{
    const brightness=v;
    ctx.fillStyle=`rgba(0,${Math.round(brightness*200)},${Math.round(brightness*255)},${0.1+brightness*.7})`;
    ctx.fillRect(ci*PW,ri*PH,PW-0.5,PH-0.5);
  }));
  // Edge overlay
  if(edges){
    const EW=W/32,EH=H/24;
    edges.forEach((row,ri)=>row.forEach((v,ci)=>{
      if(v>0.2){
        ctx.fillStyle=`rgba(0,255,136,${v*.5})`;
        ctx.fillRect(ci*EW,ri*EH,EW,EH);
      }
    }));
  }
}

// ═══════════════════════════════════════════════════════════
//  WAVEFORM CANVAS
// ═══════════════════════════════════════════════════════════
const WC={canvas:null, ctx:null};
function initWave(){
  WC.canvas=document.getElementById('wave-canvas');
  WC.ctx=WC.canvas.getContext('2d');
}
function drawWave(){
  if(!WC.ctx) return;
  const W=WC.canvas.offsetWidth, H=WC.canvas.offsetHeight;
  WC.canvas.width=W; WC.canvas.height=H;
  const ctx=WC.ctx;
  ctx.fillStyle='#020408'; ctx.fillRect(0,0,W,H);
  const n=volumeHistory.length, barW=W/n;
  volumeHistory.forEach((db,i)=>{
    const norm=Math.max(0,(db+70)/50);
    const bH=norm*H*.9;
    const g=ctx.createLinearGradient(0,H,0,H-bH);
    g.addColorStop(0,'#00ff8844'); g.addColorStop(1,'#00f5ff88');
    ctx.fillStyle=g;
    ctx.fillRect(i*barW,H-bH,barW-1,bH);
  });
  requestAnimationFrame(drawWave);
}

// ═══════════════════════════════════════════════════════════
//  MEMORY GRAPH
// ═══════════════════════════════════════════════════════════
const MC={canvas:null, ctx:null, nodes:[], edges:[]};
function initMemGraph(){
  MC.canvas=document.getElementById('mem-canvas');
  MC.ctx=MC.canvas.getContext('2d');
}
function updateMemGraph(connections){
  if(!MC.ctx||!connections) return;
  const W=MC.canvas.offsetWidth, H=MC.canvas.offsetHeight;
  MC.canvas.width=W; MC.canvas.height=H;
  const ctx=MC.ctx;
  ctx.fillStyle='rgba(2,4,8,0.3)'; ctx.fillRect(0,0,W,H);
  if(!connections.length) return;
  const nodes={};
  connections.forEach(c=>{
    if(!nodes[c.a]) nodes[c.a]={x:Math.random()*W*.8+W*.1,y:Math.random()*H*.8+H*.1};
    if(!nodes[c.b]) nodes[c.b]={x:Math.random()*W*.8+W*.1,y:Math.random()*H*.8+H*.1};
  });
  connections.forEach(c=>{
    const na=nodes[c.a], nb=nodes[c.b];
    if(!na||!nb) return;
    ctx.beginPath(); ctx.moveTo(na.x,na.y); ctx.lineTo(nb.x,nb.y);
    ctx.strokeStyle=rgba('#bf5fff',c.weight*.7); ctx.lineWidth=c.weight*2; ctx.stroke();
  });
  Object.entries(nodes).forEach(([id,n])=>{
    ctx.beginPath(); ctx.arc(n.x,n.y,3,0,Math.PI*2);
    ctx.fillStyle='#bf5fff'; ctx.fill();
    ctx.fillStyle='rgba(191,95,255,.5)'; ctx.font='7px monospace'; ctx.textAlign='center';
    ctx.fillText(id.split('_').pop().slice(0,6), n.x, n.y-5);
  });
}

// ═══════════════════════════════════════════════════════════
//  SOCKET EVENTS
// ═══════════════════════════════════════════════════════════
let _startTs = null;
setInterval(()=>{
  if(_startTs) document.getElementById('h-uptime').textContent=fmtDur(Date.now()-_startTs);
},1000);

socket.on('neuron_state', d=>{
  ingestNeuronState(d.state);
  updateRegions(d.state);
  // Status dots
  document.getElementById('dot-alive').className='status-dot active';
  document.getElementById('lbl-status').textContent=d.thinking?'THINKING':d.speaking?'SPEAKING':d.listening?'LISTENING':'ONLINE';
  document.getElementById('dot-listen').className='status-dot'+(d.listening?' active':'');
  document.getElementById('dot-think').className='status-dot'+(d.thinking?' thinking':'');
  document.getElementById('dot-speak').className='status-dot'+(d.speaking?' speaking':'');
  document.getElementById('h-emotion').textContent=(d.emotion||'?').toUpperCase();
  document.getElementById('h-episodes').textContent=d.memory?.episodes||0;
  document.getElementById('m-eps').textContent=d.memory?.episodes||0;
  // Memory connections
  const conns=d.memory?.connections||[];
  document.getElementById('m-conn').textContent=conns.length;
  const mc=document.getElementById('m-conns');
  mc.innerHTML=conns.map(c=>`<div class="mem-conn ${c.weight>.4?'strong':''}">${c.a.slice(0,8)}↔${c.b.slice(0,8)} [${(c.weight*100).toFixed(0)}%]</div>`).join('');
  updateMemGraph(conns);
});

socket.on('optic_frame', d=>{
  drawOptic(d.pixels, d.edges);
});

socket.on('face_detected', d=>{
  fireRegion('optic', .9);
  fireRegion('hippocampus', .5);
});

socket.on('speech_heard', d=>{
  addMsg('user', d.text);
  setThought(d.text, 'thinking');
  fireRegion('auditory', .95);
  fireRegion('thalamus', .9);
  volumeHistory.push(-10); volumeHistory.shift();
});

socket.on('axon_response', d=>{
  addMsg('axon', d.text);
  setThought(d.text, 'speaking');
});

socket.on('speaking_start', d=>{setThought(d.text,'speaking');});
socket.on('speaking_done',  ()=>{setThought('Listening...','');});
socket.on('thinking_start', d=>{setThought('Thinking: "'+d.text+'"','thinking');});

socket.on('log', d=>{
  sysLog(d.msg);
  if(d.msg.includes('online')||d.msg.includes('AXON')) _startTs=_startTs||Date.now();
});

socket.on('connect', ()=>sysLog('Socket connected.'));
socket.on('lm_status', d=>{
  const s=document.getElementById('llm-status');
  if(d.lm_studio){
    s.style.color='var(--green)';
    s.textContent='⬡ LM Studio: '+d.lm_model;
  } else {
    s.style.color='var(--muted)';
    s.textContent=d.claude?'◇ Claude fallback active':'⚠ No LLM connected';
  }
});

// Volume
socket.on('neuron_state', d=>{
  if(d.volume_db!==undefined){ volumeHistory.push(d.volume_db); volumeHistory.shift(); }
});

// ═══════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════
function addMsg(role, text) {
  const c=document.getElementById('conversation');
  const d=document.createElement('div');
  d.className='msg msg-'+role;
  d.innerHTML=`<div class="msg-label" style="color:${role==='axon'?'var(--purple)':'var(--cyan)'}">${role.toUpperCase()}</div>${text}`;
  c.appendChild(d); c.scrollTop=c.scrollHeight;
}
function sysLog(msg) {
  const c=document.getElementById('console-out');
  const s=document.createElement('span');
  const cls=msg.includes('Heard')?'heard':msg.includes('AXON:')?'said':msg.includes('Error')||msg.includes('❌')?'err':'info';
  s.className=cls; s.textContent='▸ '+msg;
  c.appendChild(s); c.scrollTop=c.scrollHeight;
  if(c.children.length>200) c.removeChild(c.firstChild);
}
function setThought(text, state) {
  const tb=document.getElementById('thought-bubble');
  tb.textContent=text;
  tb.className='thought-bubble'+(state?' '+state:'');
}
function sendText() {
  const inp=document.getElementById('text-input');
  const t=inp.value.trim();
  if(!t) return;
  socket.emit('user_text',{text:t});
  inp.value='';
}
document.getElementById('text-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') sendText();
});
function startAxon() {
  const cfg = {
    api_key:      document.getElementById('cfg-api').value,
    lm_url:       document.getElementById('cfg-lmurl').value || 'http://localhost:1234',
    lm_model:     document.getElementById('cfg-lmmodel').value || null,
    prefer_local: document.getElementById('cfg-local').checked,
    camera:       document.getElementById('cfg-cam').checked,
    mic:          document.getElementById('cfg-mic').checked,
  };
  socket.emit('start_engine', cfg);
  sysLog('Starting AXON...');
}
function stopAxon() { socket.emit('stop_engine'); }
function reprobe() {
  socket.emit('reprobe_lm');
  sysLog('Re-probing LM Studio...');
}

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${Math.max(0,Math.min(1,a)).toFixed(3)})`;
}
function fmtDur(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  return h?`${h}h${m%60}m`:`${m}m${s%60}s`;
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
window.addEventListener('load',()=>{
  initBrain(); initOptic(); initWave(); initMemGraph(); drawWave();
});
